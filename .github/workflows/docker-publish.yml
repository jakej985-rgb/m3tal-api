name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release Version (e.g., v1.4.0)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repo name to lowercase
        id: repo_name
        run: |
          REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo=$REPO_LOWERCASE" >> $GITHUB_OUTPUT
          echo "owner=$OWNER_LOWERCASE" >> $GITHUB_OUTPUT

      - name: Calculate Version
        id: version
        run: |
          IS_RELEASE="false"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.release_version }}" != "" ]; then
            IS_RELEASE="true"
            FULL_VERSION="${{ github.event.inputs.release_version }}"
            echo "Manual Release Version: ${FULL_VERSION}"
          else
            # Read base version from VERSION file
            if [ -f VERSION ]; then
              FILE_VERSION=$(cat VERSION | tr -d ' \n\r')
            else
              FILE_VERSION="v1.0.0"
            fi

            # Extract base X.Y.Z
            if [[ $FILE_VERSION =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              BASE_VERSION="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            else
              BASE_VERSION="v1.0.0"
            fi

            FULL_VERSION="${BASE_VERSION}.${{ github.run_number }}-test"
            echo "Test Version: ${FULL_VERSION}"
          fi

          echo "VERSION=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=${IS_RELEASE}" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Control Plane Backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo_name.outputs.repo }}
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest,enable=${{ steps.version.outputs.IS_RELEASE == 'true' }}

      - name: Build and push Control Plane Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Commit and Push Version Bump
        if: steps.version.outputs.IS_RELEASE == 'true'
        run: |
          echo "${{ steps.version.outputs.VERSION }}" > VERSION
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add VERSION
          git diff-index --quiet HEAD || git commit -m "chore: release version ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push

